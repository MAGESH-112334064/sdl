<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Canteen Connect</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #f9f9f9;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 15px;
      width: 360px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
      border-top: 5px solid gold;
    }

    h2 {
      text-align: center;
      color: #b8860b;
      margin-bottom: 20px;
    }

    .input-group {
      position: relative;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ddd;
      transition: 0.3s;
    }

    input:focus {
      border-color: gold;
      outline: none;
      box-shadow: 0 0 5px rgba(255, 215, 0, 0.5);
    }

    .eye {
      position: absolute;
      right: 12px;
      top: 18px;
      cursor: pointer;
      font-size: 14px;
      color: gray;
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(45deg, gold, #ffd700);
      color: black;
      border: none;
      margin-top: 12px;
      cursor: pointer;
      border-radius: 8px;
      font-weight: bold;
    }

    .btn:hover {
      box-shadow: 0 0 10px rgba(255, 215, 0, 0.7);
    }

    .error {
      color: red;
      font-size: 13px;
      text-align: center;
    }

    .success {
      color: green;
      text-align: center;
    }

    .link {
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>🔐 Login</h2>

  <form id="loginForm">

    <input type="email" id="email" placeholder="Email" maxlength="40">
    <div class="error" id="emailError"></div>

    <div class="input-group">
      <input type="password" id="password" placeholder="Password" maxlength="40">
      <span class="eye" onclick="togglePassword()">👁</span>
    </div>
    <div class="error" id="passError"></div>

    <div class="remember">
      <input type="checkbox" id="remember">
      <label for="remember">Remember Me</label>
    </div>

    <button class="btn">Login</button>

    <div class="error" id="error"></div>
    <div class="success" id="success"></div>

  </form>

  <div class="link">
    Don't have an account? <a href="register.html">Register</a>
  </div>
</div>

<script>

function togglePassword() {
  let pass = document.getElementById("password");
  pass.type = pass.type === "password" ? "text" : "password";
}

function isValidEmail(email) {
  return /^[^ ]+@[^ ]+\.[a-z]{2,3}$/.test(email);
}

document.getElementById("email").addEventListener("input", function() {
  let val = this.value.trim();

  if (val === "") {
    this.style.border = "1px solid red";
    document.getElementById("emailError").innerText = "Email is required";
  } 
  else if (!isValidEmail(val)) {
    this.style.border = "1px solid red";
    document.getElementById("emailError").innerText = "Invalid email format";
  } 
  else {
    this.style.border = "1px solid green";
    document.getElementById("emailError").innerText = "";
  }
});

document.getElementById("password").addEventListener("input", function() {
  let val = this.value.trim();

  if (val === "") {
    this.style.border = "1px solid red";
    document.getElementById("passError").innerText = "Password is required";
  } 
  else if (val.length < 6) {
    this.style.border = "1px solid red";
    document.getElementById("passError").innerText = "Minimum 6 characters";
  } 
  else {
    this.style.border = "1px solid green";
    document.getElementById("passError").innerText = "";
  }
});

document.getElementById("loginForm").addEventListener("submit", function(e){
  e.preventDefault();

  let email = document.getElementById("email").value.trim();
  let password = document.getElementById("password").value.trim();
  let remember = document.getElementById("remember").checked;

  let user = JSON.parse(localStorage.getItem("user"));

  document.getElementById("error").innerText = "";
  document.getElementById("success").innerText = "";

  if (email === "" || password === "") {
    document.getElementById("error").innerText = "All fields required ❌";
    return;
  }

  if (!isValidEmail(email)) {
    document.getElementById("error").innerText = "Enter valid email ❌";
    return;
  }

  if (password.length < 6) {
    document.getElementById("error").innerText = "Password too short ❌";
    return;
  }

  if (!user) {
    document.getElementById("error").innerText = "No user found. Please register.";
    return;
  }

  if (email === user.email && password === user.password) {

    document.getElementById("success").innerText = "Login Successful 🎉";

    if (remember) {
      localStorage.setItem("loggedIn", "true");
    }

    setTimeout(() => {
      window.location.href = "index.html";
    }, 1200);

  } else {
    document.getElementById("error").innerText = "Invalid email or password ❌";
  }

});

window.onload = function() {
  if (localStorage.getItem("loggedIn") === "true") {
    window.location.href = "index.html";
  }
};

</script>

</body>
</html>
